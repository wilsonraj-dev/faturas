<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-icon mat-card-avatar class="login-icon">lock</mat-icon>
      <mat-card-title>Entrar</mat-card-title>
      <mat-card-subtitle>Acesse sua conta</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" [(ngModel)]="email" name="email" required>
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" [(ngModel)]="password" name="password" required>
          <mat-icon matPrefix>vpn_key</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="full-width login-btn" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="20" class="spinner-inline"></mat-spinner>
          <span *ngIf="!loading">Entrar</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <span>Não tem conta?</span>
      <a mat-button color="accent" routerLink="/register">Cadastre-se</a>
    </mat-card-actions>
  </mat-card>
</div>
