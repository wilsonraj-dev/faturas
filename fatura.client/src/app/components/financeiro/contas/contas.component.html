<div class="container">
  <app-page-header title="Contas Financeiras"
                   subtitle="Gerencie as contas usadas nos seus lançamentos."
                   icon="credit_card">
    <button page-actions mat-raised-button color="primary" (click)="abrirDialog()">
      <mat-icon>add</mat-icon> Nova Conta
    </button>
  </app-page-header>

  <app-feedback-state *ngIf="carregando" kind="loading" title="Carregando contas"></app-feedback-state>

  <app-table-shell *ngIf="!carregando && contas.length > 0"
                   title="Contas cadastradas"
                   icon="credit_card"
                   [count]="contas.length">
    <table mat-table [dataSource]="contasPaginadas" class="full-table contas-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let c">{{ c.id }}</td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let c">{{ c.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="tipo">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let c">{{ getTipoLabel(c.tipo) }}</td>
      </ng-container>

      <ng-container matColumnDef="instituicaoNome">
        <th mat-header-cell *matHeaderCellDef>Instituição</th>
        <td mat-cell *matCellDef="let c">{{ c.instituicaoNome }}</td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button color="primary" (click)="abrirDialog(c)" matTooltip="Editar" aria-label="Editar conta">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deletar(c)" matTooltip="Excluir" aria-label="Excluir conta">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator class="contas-paginator" [length]="contas.length" [pageSize]="pageSize"
                   [pageSizeOptions]="pageSizeOptions" [pageIndex]="pageIndex" (page)="onPageChange($event)"
                   showFirstLastButtons>
    </mat-paginator>
  </app-table-shell>

  <app-feedback-state *ngIf="!carregando && contas.length === 0"
                      kind="empty"
                      icon="credit_card"
                      title="Nenhuma conta cadastrada"
                      message="Cadastre uma conta para começar a organizar seus lançamentos.">
    <button mat-raised-button color="primary" (click)="abrirDialog()">Cadastrar conta</button>
  </app-feedback-state>
</div>
