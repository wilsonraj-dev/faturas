<div class="categorias-container">
  <h2>Categorias e Subcategorias</h2>

  <mat-card class="example-card" appearance="outlined">
    <mat-card-content>
      <mat-tab-group [(selectedIndex)]="tabIndex">
        <!-- Tab Categorias -->
        <mat-tab label="Categorias">
          <div class="tab-content">
            <div class="header-actions">
              <button mat-raised-button color="primary" (click)="abrirCategoriaDialog()">
                <mat-icon>add</mat-icon> Nova Categoria
              </button>
            </div>

            <div *ngIf="carregandoCategorias" class="loading">
              <mat-spinner diameter="40"></mat-spinner>
            </div>

            <mat-card *ngIf="!carregandoCategorias && categorias.length > 0" class="table-card">
              <mat-card-content>
                <table mat-table [dataSource]="categoriasPaginadas" class="full-table">
                  <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef>ID</th>
                    <td mat-cell *matCellDef="let c">{{ c.id }}</td>
                  </ng-container>

                  <ng-container matColumnDef="nome">
                    <th mat-header-cell *matHeaderCellDef>Nome</th>
                    <td mat-cell *matCellDef="let c">{{ c.nome }}</td>
                  </ng-container>

                  <ng-container matColumnDef="tipo">
                    <th mat-header-cell *matHeaderCellDef>Tipo</th>
                    <td mat-cell *matCellDef="let c">
                      <span class="badge" [ngClass]="getTipoClass(c.tipo)">{{ getTipoLabel(c.tipo) }}</span>
                    </td>
                  </ng-container>

                  <ng-container matColumnDef="quantidadeSubcategorias">
                    <th mat-header-cell *matHeaderCellDef>Subcategorias</th>
                    <td mat-cell *matCellDef="let c">{{ c.quantidadeSubcategorias }}</td>
                  </ng-container>

                  <ng-container matColumnDef="acoes">
                    <th mat-header-cell *matHeaderCellDef>Ações</th>
                    <td mat-cell *matCellDef="let c">
                      <button mat-icon-button color="primary" (click)="abrirCategoriaDialog(c)" matTooltip="Editar">
                        <mat-icon>edit</mat-icon>
                      </button>
                      <button mat-icon-button color="warn" (click)="deletarCategoria(c)" matTooltip="Excluir">
                        <mat-icon>delete</mat-icon>
                      </button>
                    </td>
                  </ng-container>

                  <tr mat-header-row *matHeaderRowDef="categoriaCols"></tr>
                  <tr mat-row *matRowDef="let row; columns: categoriaCols;"></tr>
                </table>

                <mat-paginator [length]="categorias.length" [pageSize]="catPageSize" [pageSizeOptions]="pageSizeOptions"
                               [pageIndex]="catPageIndex" (page)="onCatPageChange($event)" showFirstLastButtons>
                </mat-paginator>
              </mat-card-content>
            </mat-card>

            <mat-card *ngIf="!carregandoCategorias && categorias.length === 0" class="empty-card">
              <mat-card-content class="empty-state">
                <mat-icon>category</mat-icon>
                <p>Nenhuma categoria cadastrada</p>
              </mat-card-content>
            </mat-card>
          </div>
        </mat-tab>

        <!-- Tab Subcategorias -->
        <mat-tab label="Subcategorias">
          <div class="tab-content">
            <div class="header-actions">
              <button mat-raised-button color="primary" (click)="abrirSubcategoriaDialog()">
                <mat-icon>add</mat-icon> Nova Subcategoria
              </button>
            </div>

            <div *ngIf="carregandoSubcategorias" class="loading">
              <mat-spinner diameter="40"></mat-spinner>
            </div>

            <mat-card *ngIf="!carregandoSubcategorias && subcategorias.length > 0" class="table-card">
              <mat-card-content>
                <table mat-table [dataSource]="subcategoriasPaginadas" class="full-table">
                  <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef>ID</th>
                    <td mat-cell *matCellDef="let s">{{ s.id }}</td>
                  </ng-container>

                  <ng-container matColumnDef="nome">
                    <th mat-header-cell *matHeaderCellDef>Nome</th>
                    <td mat-cell *matCellDef="let s">{{ s.nome }}</td>
                  </ng-container>

                  <ng-container matColumnDef="categoriaNome">
                    <th mat-header-cell *matHeaderCellDef>Categoria</th>
                    <td mat-cell *matCellDef="let s">{{ s.categoriaNome }}</td>
                  </ng-container>

                  <ng-container matColumnDef="acoes">
                    <th mat-header-cell *matHeaderCellDef>Ações</th>
                    <td mat-cell *matCellDef="let s">
                      <button mat-icon-button color="primary" (click)="abrirSubcategoriaDialog(s)" matTooltip="Editar">
                        <mat-icon>edit</mat-icon>
                      </button>
                      <button mat-icon-button color="warn" (click)="deletarSubcategoria(s)" matTooltip="Excluir">
                        <mat-icon>delete</mat-icon>
                      </button>
                    </td>
                  </ng-container>

                  <tr mat-header-row *matHeaderRowDef="subcategoriaCols"></tr>
                  <tr mat-row *matRowDef="let row; columns: subcategoriaCols;"></tr>
                </table>

                <mat-paginator [length]="subcategorias.length" [pageSize]="subPageSize" [pageSizeOptions]="pageSizeOptions"
                               [pageIndex]="subPageIndex" (page)="onSubPageChange($event)" showFirstLastButtons>
                </mat-paginator>
              </mat-card-content>
            </mat-card>

            <mat-card *ngIf="!carregandoSubcategorias && subcategorias.length === 0" class="empty-card">
              <mat-card-content class="empty-state">
                <mat-icon>label</mat-icon>
                <p>Nenhuma subcategoria cadastrada</p>
              </mat-card-content>
            </mat-card>
          </div>
        </mat-tab>
      </mat-tab-group>
    </mat-card-content>
  </mat-card>
</div>
