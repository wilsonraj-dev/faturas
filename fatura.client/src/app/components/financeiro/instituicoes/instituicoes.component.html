<div class="container">
  <app-page-header title="Instituições Financeiras"
                   subtitle="Organize bancos e instituições vinculados às suas contas."
                   icon="account_balance">
    <button page-actions mat-raised-button color="primary" (click)="abrirDialog()">
      <mat-icon>add</mat-icon> Nova Instituição
    </button>
  </app-page-header>

  <app-feedback-state *ngIf="carregando" kind="loading" title="Carregando instituições"></app-feedback-state>

  <app-table-shell *ngIf="!carregando && instituicoes.length > 0"
                   class="desktop-record-table"
                   title="Instituições cadastradas"
                   icon="account_balance"
                   [count]="instituicoes.length">
    <table mat-table [dataSource]="instituicoesPaginadas" class="full-table instituicoes-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let i">{{ i.id }}</td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let i">{{ i.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="quantidadeContas">
        <th mat-header-cell *matHeaderCellDef>Contas</th>
        <td mat-cell *matCellDef="let i">{{ i.quantidadeContas }}</td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let i">
          <button mat-icon-button color="primary" (click)="abrirDialog(i)" matTooltip="Editar" aria-label="Editar instituição">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deletar(i)" matTooltip="Excluir" aria-label="Excluir instituição">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator class="instituicoes-paginator" [length]="instituicoes.length" [pageSize]="pageSize"
                   [pageSizeOptions]="pageSizeOptions" [pageIndex]="pageIndex" (page)="onPageChange($event)"
                   showFirstLastButtons>
    </mat-paginator>
  </app-table-shell>

  <div *ngIf="!carregando && instituicoes.length > 0" class="mobile-record-list">
    <app-record-card *ngFor="let instituicao of instituicoesPaginadas"
                     [title]="instituicao.nome"
                     eyebrow="Instituição financeira"
                     [value]="instituicao.quantidadeContas + ' conta(s)'"
                     icon="account_balance">
      <dl record-details class="record-detail-grid">
        <div><dt>Identificador</dt><dd>#{{ instituicao.id }}</dd></div>
        <div><dt>Contas vinculadas</dt><dd>{{ instituicao.quantidadeContas }}</dd></div>
      </dl>
      <div record-actions>
        <button mat-icon-button color="primary" (click)="abrirDialog(instituicao)" aria-label="Editar instituição"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="deletar(instituicao)" aria-label="Excluir instituição"><mat-icon>delete</mat-icon></button>
      </div>
    </app-record-card>
  </div>
  <mat-paginator *ngIf="!carregando && instituicoes.length > 0"
                 class="mobile-record-paginator"
                 [length]="instituicoes.length" [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions"
                 [pageIndex]="pageIndex" (page)="onPageChange($event)" showFirstLastButtons>
  </mat-paginator>

  <app-feedback-state *ngIf="!carregando && instituicoes.length === 0"
                      kind="empty"
                      icon="account_balance"
                      title="Nenhuma instituição cadastrada"
                      message="Cadastre uma instituição para vinculá-la às suas contas financeiras.">
    <button mat-raised-button color="primary" (click)="abrirDialog()">Cadastrar instituição</button>
  </app-feedback-state>
</div>
