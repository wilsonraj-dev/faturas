<mat-toolbar color="primary">
  <mat-icon>credit_card</mat-icon>
  <span style="margin-left: 8px;">Controle de Faturas</span>
  <span class="spacer"></span>
  <button mat-button routerLink="/dashboard">
    <mat-icon>dashboard</mat-icon> Dashboard
  </button>
  <button mat-button routerLink="/faturas">
    <mat-icon>receipt_long</mat-icon> Faturas
  </button>
  <button mat-button routerLink="/compras/nova">
    <mat-icon>add_shopping_cart</mat-icon> Nova Compra
  </button>
  <button mat-button routerLink="/compras-recorrentes">
    <mat-icon>autorenew</mat-icon> Recorrentes
  </button>
  <button mat-button routerLink="/simulacoes">
    <mat-icon>calculate</mat-icon> Simulações
  </button>
  <button mat-button routerLink="/fornecedores">
    <mat-icon>store</mat-icon> Fornecedores
  </button>
  <button mat-icon-button (click)="themeService.toggleTheme()" matTooltip="Alternar tema">
    <mat-icon>{{ themeService.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
  <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
    <mat-icon>account_circle</mat-icon>
    <span class="user-name">{{ userName }}</span>
  </button>
  <mat-menu #userMenu="matMenu">
    <button mat-menu-item disabled>
      <mat-icon>person</mat-icon>
      <span>{{ userName }}</span>
    </button>
    <button mat-menu-item routerLink="/configuracoes">
      <mat-icon>settings</mat-icon>
      <span>Configurações</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon>exit_to_app</mat-icon>
      <span>Sair</span>
    </button>
  </mat-menu>
</mat-toolbar>
