<mat-sidenav-container class="layout-container"
                       [class.is-handset]="isHandset"
                       [class.is-tablet]="isTablet"
                       [hasBackdrop]="isHandset"
                       autosize>
  <mat-sidenav [mode]="isHandset ? 'over' : 'side'"
               [opened]="isMenuOpen"
               [disableClose]="!isHandset"
               (openedChange)="onMenuOpenedChange($event)"
               class="sidebar"
               [class.sidebar-collapsed]="isCollapsed"
               aria-label="Navegação principal">
    <div class="sidebar-header">
      <mat-icon>credit_card</mat-icon>
      <span *ngIf="!isCollapsed">Controle de Faturas</span>
      <span class="sidebar-header-spacer"></span>
      <button *ngIf="isHandset"
              mat-icon-button
              type="button"
              class="sidebar-close"
              (click)="toggleMenu()"
              aria-label="Fechar menu de navegação">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <mat-divider></mat-divider>

    <nav class="navigation" aria-label="Formulários do sistema">
      <a mat-list-item
         *ngFor="let item of navigationItems; trackBy: trackByRoute"
         [routerLink]="item.route"
         routerLinkActive="active-link"
         [routerLinkActiveOptions]="{ exact: item.exact }"
         [matTooltip]="isCollapsed ? item.label : ''"
         matTooltipPosition="right"
         (click)="onNavigation()"
         class="navigation-item">
        <mat-icon class="navigation-icon">{{ item.icon }}</mat-icon>
        <span *ngIf="!isCollapsed" class="navigation-label">{{ item.label }}</span>
      </a>
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="layout-content">
    <mat-toolbar color="primary" class="topbar">
      <button mat-icon-button
              type="button"
              (click)="toggleMenu()"
              [attr.aria-label]="menuButtonLabel"
              [attr.aria-expanded]="isHandset ? isMenuOpen : !isCollapsed"
              [matTooltip]="menuButtonLabel">
        <mat-icon>{{ menuButtonIcon }}</mat-icon>
      </button>

      <div class="brand">
        <mat-icon>credit_card</mat-icon>
        <span>Controle de Faturas</span>
      </div>

      <span class="spacer"></span>

      <button mat-icon-button type="button" (click)="themeService.toggleTheme()" aria-label="Alternar tema" matTooltip="Alternar tema">
        <mat-icon>{{ themeService.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button mat-button type="button" [matMenuTriggerFor]="userMenu" class="user-menu-btn" aria-label="Abrir menu do usuário">
        <mat-icon>account_circle</mat-icon>
        <span class="user-name">{{ userName }}</span>
      </button>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item disabled>
          <mat-icon>person</mat-icon>
          <span>{{ userName }}</span>
        </button>
        <button mat-menu-item routerLink="/configuracoes">
          <mat-icon>settings</mat-icon>
          <span>Configurações</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item type="button" (click)="logout()">
          <mat-icon>exit_to_app</mat-icon>
          <span>Sair</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
