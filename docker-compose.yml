services:
  postgres:
    image: postgres:17-alpine
    container_name: fatura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fatura_db
      POSTGRES_USER: fatura_user
      POSTGRES_PASSWORD: fatura_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fatura-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fatura_user -d fatura_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fatura-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      UseHttpsRedirection: "false"
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=fatura_db;Username=fatura_user;Password=fatura_password;SSL Mode=Disable
      Jwt__Key: "ChaveSecretaSuperSeguraParaJWT_FaturaApp_2025!@#$%"
      Jwt__Issuer: FaturaApp
      Jwt__Audience: FaturaApp
      Jwt__ExpireHours: "8"
    ports:
      - "5000:8080"
    networks:
      - fatura-network

  frontend:
    build:
      context: ./fatura.client
      dockerfile: Dockerfile
    container_name: fatura-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "4200:80"
    networks:
      - fatura-network

networks:
  fatura-network:
    driver: bridge

volumes:
  postgres_data:
